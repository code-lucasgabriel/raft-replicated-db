version: '3'

# Three-node cluster, identical configuration except for NODE_ID and
# BOOTSTRAP. node-1 bootstraps the cluster on its very first boot — that
# writes the initial Configuration (containing all three voters) to its
# BoltDB log, which then replicates to the other two via AppendEntries.
# Subsequent restarts of any node skip the bootstrap step; existing state
# in the per-node data volume drives recovery.
#
# Each node listens on TWO ports:
#   - 5000: gRPC — client DB API + peer Ricart-Agrawala mutex service
#   - 7000: Raft TCP transport (peers only; not exposed to the host)
#
# Per-node named volumes keep BoltDB files and snapshots across restarts.

services:
  node-1:
    build: .
    environment:
      - NODE_ID=node-1
      - NODE_PORT=5000
      - DATA_DIR=/var/lib/raft-db
      - PEERS=node-1=node-1:7000,node-2=node-2:7000,node-3=node-3:7000
      - GRPC_PEERS=node-1=node-1:5000,node-2=node-2:5000,node-3=node-3:5000
      - BOOTSTRAP=true
    volumes:
      - node1-data:/var/lib/raft-db
    ports:
      - "5001:5000"
    restart: unless-stopped

  node-2:
    build: .
    environment:
      - NODE_ID=node-2
      - NODE_PORT=5000
      - DATA_DIR=/var/lib/raft-db
      - PEERS=node-1=node-1:7000,node-2=node-2:7000,node-3=node-3:7000
      - GRPC_PEERS=node-1=node-1:5000,node-2=node-2:5000,node-3=node-3:5000
    volumes:
      - node2-data:/var/lib/raft-db
    ports:
      - "5002:5000"
    restart: unless-stopped

  node-3:
    build: .
    environment:
      - NODE_ID=node-3
      - NODE_PORT=5000
      - DATA_DIR=/var/lib/raft-db
      - PEERS=node-1=node-1:7000,node-2=node-2:7000,node-3=node-3:7000
      - GRPC_PEERS=node-1=node-1:5000,node-2=node-2:5000,node-3=node-3:5000
    volumes:
      - node3-data:/var/lib/raft-db
    ports:
      - "5003:5000"
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:
