syntax = "proto3";

package db.v1;

option go_package = "github.com/code-lucasgabriel/raft-replicated-db/internal/pb/db/v1;dbv1";

// DB is the client-facing key/value API. Clients may connect to any node;
// writes against a follower respond with leader_hint set so the client can
// retry against the current leader.
//
// Every request and response carries a Lamport timestamp. A node treats an
// incoming request as a message receive (clock.Observe) and stamps the
// response on send (clock.Tick), so causality flows client -> node -> client
// and, through the Raft log, node -> node.
service DB {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  // Incr atomically increments a numeric key cluster-wide: the receiving
  // node enters the Ricart-Agrawala critical section, performs
  // read-modify-write against the Raft leader, and releases the CS. Works
  // on any node — no leader hint needed.
  rpc Incr(IncrRequest) returns (IncrResponse);
}

message GetRequest {
  string key = 1;
  uint64 lamport_time = 2;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
  // Populated when this node served a stale read or could not serve the read.
  string leader_hint = 3;
  uint64 lamport_time = 4;
}

message PutRequest {
  string key = 1;
  bytes value = 2;
  uint64 lamport_time = 3;
}

message PutResponse {
  // Empty when accepted by the leader; set to the leader's node id otherwise.
  string leader_hint = 1;
  uint64 lamport_time = 2;
}

message DeleteRequest {
  string key = 1;
  uint64 lamport_time = 2;
}

message DeleteResponse {
  string leader_hint = 1;
  uint64 lamport_time = 2;
}

message IncrRequest {
  string key = 1;
  // Amount to add; the value must be (or become) a decimal integer string.
  int64 delta = 2;
  // Skip the distributed lock. Exists for two reasons: (1) the lost-update
  // experiment — concurrent unsafe increments race on read-modify-write;
  // (2) internal forwarding — a node already holding the CS forwards the
  // increment to the leader with unsafe=true, so the leader executes it
  // under the origin node's lock instead of deadlocking on a second one.
  bool unsafe = 3;
  uint64 lamport_time = 4;
}

message IncrResponse {
  int64 new_value = 1;
  uint64 lamport_time = 2;
}
